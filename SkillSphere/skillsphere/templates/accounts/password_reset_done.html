{% extends 'base.html' %}

{% block title %}Email Sent | SkillSphere{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="glass-card auth-card" style="text-align: center;">
        <div class="auth-badge">✅ Email Sent</div>
        <h1 class="auth-title" style="font-size: 2rem;">Check Your Email</h1>
        <p class="auth-text">
            We have sent a password reset link to your email address.
            Please check your inbox and follow the instructions.
        </p>
        <div class="form-actions" style="justify-content: center;">
            <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
        </div>
    </div>
</section>
{% endblock %}
