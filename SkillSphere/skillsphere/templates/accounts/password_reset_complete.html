{% extends 'base.html' %}

{% block title %}Password Reset Complete | SkillSphere{% endblock %}

{% block content %}
<section class="auth-wrapper">
    <div class="glass-card auth-card" style="text-align: center;">
        <div class="auth-badge">🎉 Password Changed!</div>
        <h1 class="auth-title" style="font-size: 2rem;">All Done!</h1>
        <p class="auth-text">
            Your password has been successfully reset.
            You can now log in with your new password.
        </p>
        <div class="form-actions" style="justify-content: center;">
            <a href="{% url 'login' %}" class="btn btn-primary">Login Now</a>
        </div>
    </div>
</section>
{% endblock %}
